<!-- Single social platform card — injected into social_email.html -->
<tr>
  <td style="padding: 8px 30px;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 10px;">
      <tr>
        <td style="padding: 22px 20px; text-align: center;">
          <!-- Platform Name -->
          <h3 style="margin: 0 0 4px; font-size: 18px; font-weight: 600; color: {{PLATFORM_COLOR}};">
            {{PLATFORM_NAME}}
          </h3>
          <p style="margin: 0 0 16px; font-size: 13px; color: #666;">
            {{PLATFORM_DESCRIPTION}}
          </p>
          <!-- QR Code image (hosted URL or empty) -->
          {{QR_IMAGE}}
          <!-- Join button -->
          <table cellpadding="0" cellspacing="0" border="0" style="margin: 16px auto 0;">
            <tr>
              <td style="background-color: {{PLATFORM_COLOR}}; border-radius: 6px;">
                <a href="{{PLATFORM_URL}}" target="_blank" style="display: inline-block; padding: 10px 28px; color: #ffffff; font-size: 14px; font-weight: 600; text-decoration: none;">
                  {{BUTTON_TEXT}}
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </td>
</tr>
