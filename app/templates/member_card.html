<!-- Single Entry Pass card — injected into registration_email.html -->
<div class="pass-card">
  <div class="pass-card-header">Entry Pass</div>
  <div class="pass-card-body">
    <div class="pass-name">{{MEMBER_NAME}}</div>
    {{QR_IMAGE}}
    <div class="pass-ref">
      <span class="label">Member No</span>
      <span class="value">{{MEMBER_NO}}</span>
    </div>
  </div>
</div>
