<!-- Single member QR card — injected into registration_email.html -->
<tr>
  <td style="padding: 8px 30px;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 10px; overflow: hidden;">
      <tr>
        <td style="padding: 22px 20px; text-align: center;">
          <!-- Member Name -->
          <h3 style="margin: 0 0 4px; font-size: 18px; font-weight: 600; color: #333333;">
            {{MEMBER_NAME}}
          </h3>
          <!-- Ticket Number -->
          <p style="margin: 0 0 16px; font-size: 13px; color: #365288; font-weight: 500; letter-spacing: 0.5px;">
            {{TICKET_NUMBER}}
          </p>
          <!-- QR Code (inline CID image or fallback text) -->
          {{QR_IMAGE}}
        </td>
      </tr>
    </table>
  </td>
</tr>
